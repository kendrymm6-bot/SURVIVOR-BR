name: Build SURVIVOR-BR
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos & SDK
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz
          sudo mv iPhoneOS16.5.sdk /opt/theos/sdks/
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Make executable
        run: chmod +x build.sh

      - name: Compile Tweak
        run: ./build.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Survivor-BR-Package
          path: packages/*.deb
